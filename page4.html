<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday My Love</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      height:100vh;

      background:white;
       background-image: url('./images/main.jpg');
      overflow:hidden;

      display:flex;
      justify-content:center;
      align-items:center;

      font-family:'Baloo 2', cursive;
    }

    /* MAIN CONTAINER */
    .container{
      width:100%;
      height:100vh;

      position:relative;

      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
    }

    /* TOP TEXT */
    .top-text{
      margin-top:20px;

      font-size:58px;
      font-weight:700;

      color:#d96a5f;

      letter-spacing:3px;

      text-align:center;
    }

    /* BIG CAKE IMAGE */
    .cake-box{
      width:100%;

      display:flex;
      justify-content:center;
      align-items:center;

      margin-top:10px;
    }

    .cake-box img{
      width:850px;   /* BIG IMAGE */

      max-width:95%;

      height:auto;
    }

    /* NEXT BUTTON */
    .next-btn{
      position:absolute;

      right:90px;
      top:310px;

      width:210px;
      height:85px;

      border:none;

      border-radius:45px;

      background:#f7c1d8;

      color:#ff5f5f;

      font-size:40px;
      font-weight:800;

      font-family:'Baloo 2', cursive;

      cursor:pointer;

      box-shadow:
      inset 0 -5px 0 rgba(0,0,0,0.08),
      0 5px 10px rgba(0,0,0,0.1);

      transition:0.2s;
    }

    .next-btn:hover{
      transform:scale(1.05);
    }

    /* MOBILE */
    @media(max-width:768px){

      .top-text{
        font-size:34px;
        margin-top:30px;
      }

      .cake-box{
        margin-top:30px;
      }

      .cake-box img{
        width:420px;
      }

      .next-btn{
        width:150px;
        height:65px;
        
        font-size:28px;

        right:20px;
        top:300px;
      }
    }

  </style>
</head>
<body>

  <div class="container">

    <!-- TEXT -->
    <div class="top-text">
      Happyyyy Biirthhdayy Ritika🎂✨️
    </div>

    <!-- BIG CAKE IMAGE -->
    <div class="cake-box">

      <!-- PUT YOUR IMAGE/GIF HERE -->
      <img src="./images/cake unlit.png" alt="Birthday Cake">

    </div>

    <!-- NEXT BUTTON -->
    <button class="next-btn"
    onclick="window.location.href='page5.html'">

      Next

    </button>

  </div>

</body>
</html>
