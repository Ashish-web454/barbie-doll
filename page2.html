<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      height:100vh;

      background:white;
        background-image: url('./images/BACK31.jpg');
    background-size: cover;      /* Makes image cover full screen */
    background-repeat: no-repeat;
    background-position: center;
    height: 100vh;
    margin: 0;
      display:flex;
      justify-content:center;
      align-items:center;

      overflow:hidden;

      font-family:'Baloo 2', cursive;
    }

    /* MAIN CONTAINER */
    .container{
      width:100%;
      max-width:1200px;

      position:relative;

      display:flex;
      align-items:center;
      justify-content:space-between;

      padding:40px 80px;
    }

    /* HAPPY BIRTHDAY TEXT */
    .happy-text{
      position:absolute;

      top:20px;
      left:50%;
      transform:translateX(-50%);

      font-size:65px;
      font-weight:800;

      letter-spacing:4px;

      display:flex;
      justify-content:center;
      align-items:center;
      flex-wrap:wrap;
    }

    .happy-text span{
      opacity:0;

      display:inline-block;

      animation:popIn 0.5s forwards;
    }

    /* LETTER COLORS + ANIMATION */

    .happy-text span:nth-child(1){
      color:#ff4d4d;
      animation-delay:0.2s;
    }

    .happy-text span:nth-child(2){
      color:#ff9933;
      animation-delay:0.4s;
    }

    .happy-text span:nth-child(3){
      color:#ffd633;
      animation-delay:0.6s;
    }

    .happy-text span:nth-child(4){
      color:#66cc66;
      animation-delay:0.8s;
    }

    .happy-text span:nth-child(5){
      color:#3399ff;
      animation-delay:1s;
    }

    .happy-text span:nth-child(7){
      color:#ff66cc;
      animation-delay:1.2s;
    }

    .happy-text span:nth-child(8){
      color:#ff4d4d;
      animation-delay:1.4s;
    }

    .happy-text span:nth-child(9){
      color:#ff9933;
      animation-delay:1.6s;
    }

    .happy-text span:nth-child(10){
      color:#ffd633;
      animation-delay:1.8s;
    }

    .happy-text span:nth-child(11){
      color:#66cc66;
      animation-delay:2s;
    }

    .happy-text span:nth-child(12){
      color:#3399ff;
      animation-delay:2.2s;
    }

    .happy-text span:nth-child(13){
      color:#cc66ff;
      animation-delay:2.4s;
    }

    .happy-text span:nth-child(14){
      color:#ff66cc;
      animation-delay:2.6s;
    }

    @keyframes popIn{

      from{
        opacity:0;
        transform:translateY(-20px) scale(0.5);
      }

      to{
        opacity:1;
        transform:translateY(0) scale(1);
      }
    }

    /* BIG GIF */
    .gif-box{
      width:100%;

      display:flex;
      justify-content:flex-start;
      align-items:center;

      margin-top:80px;
    }

    .gif-box img{
      width:520px;
      height:auto;
    }

    /* NEXT BUTTON */
    .next-btn{
      width:230px;
      height:90px;

      border:none;

      border-radius:50px;

      background:#f6b5d0;

      color:#ff5c5c;

      font-size:42px;
      font-weight:800;

      font-family:'Baloo 2', cursive;

      cursor:pointer;

      position:absolute;

      right:100px;
      bottom:120px;

      box-shadow:
      inset 0 -5px 0 rgba(0,0,0,0.08),
      0 5px 10px rgba(0,0,0,0.1);

      transition:0.2s;
    }

    .next-btn:hover{
      transform:scale(1.05);
    }

    /* STARS */
    .star{
      position:absolute;
      font-size:35px;

      animation:blink 1.5s infinite;
    }

    .s1{
      left:120px;
      top:230px;
      color:#ff5e5e;
    }

    .s2{
      left:180px;
      bottom:170px;
      color:#33c3ff;
    }

    .s3{
      right:320px;
      top:280px;
      color:#66ff66;
    }

    .s4{
      right:420px;
      bottom:170px;
      color:#ff66cc;
    }

    .s5{
      left:450px;
      top:150px;
      color:#ff9933;
    }

    @keyframes blink{

      0%{
        opacity:0.3;
        transform:scale(0.8);
      }

      50%{
        opacity:1;
        transform:scale(1.2);
      }

      100%{
        opacity:0.3;
        transform:scale(0.8);
      }
    }

    /* MOBILE */
    @media(max-width:768px){

      .container{
        padding:20px;
      }

    .happy-text{
  position:absolute;

  top:5px;
  left:50%;

  transform:translateX(-50%);

  font-size:52px;
  font-weight:800;

  letter-spacing:2px;

  display:flex;
  justify-content:center;
  align-items:center;

  flex-wrap:nowrap;   /* keeps text in ONE LINE */

  white-space:nowrap; /* prevents line break */
}
      }

      .gif-box{
        justify-content:center;
        margin-top:100px;
      }

      .gif-box img{
        width:280px;
      }

      .next-btn{
        width:170px;
        height:70px;

        font-size:30px;

        right:20px;
        bottom:100px;
      }
    

  </style>
</head>
<body>

  <div class="container">

    <!-- HAPPY BIRTHDAY -->
    <div class="happy-text">

      <span>H</span>
      <span>A</span>
      <span>P</span>
      <span>P</span>
      <span>Y</span>

      &nbsp;

      <span>B</span>
      <span>I</span>
      <span>R</span>
      <span>T</span>
      <span>H</span>
      <span>D</span>
      <span>A</span>
      <span>Y</span>

    </div>

    <!-- BIG GIF -->
    <div class="gif-box">

      <!-- PUT YOUR GIF HERE -->
      <img src="./images/image 1.png" alt="Birthday Dog">

    </div>

    <!-- STARS -->
    <div class="star s1">✦</div>
    <div class="star s2">✦</div>
    <div class="star s3">✦</div>
    <div class="star s4">✦</div>
    <div class="star s5">✦</div>

    <!-- NEXT BUTTON -->
    <button class="next-btn"
    onclick="window.location.href='page3.html'">

      NEXT

    </button>

  </div>

</body>
</html>
