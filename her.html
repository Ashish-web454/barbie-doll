<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Photo & Video Page</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial, sans-serif;

    /* YOUR PORTRAIT BACKGROUND */
    background-image:url("./images/main31.jpeg");
    background-size:contain;
    background-position:center;
    background-repeat:no-repeat;
    background-color:black;
}

/* CENTER CIRCULAR PHOTO */
.center-photo{
    position:relative;

    width:450px;
    height:450px;

    border-radius:50%;

    overflow:hidden;

    z-index:2;

    border:10px solid #CC8899;

    box-shadow:
        0 0 15px #CC8899,
        0 0 30px #CC8899,
        0 0 50px rgba(255,79,163,0.6);
}

.center-photo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* SMALL VIDEO TOP RIGHT */
.video-box{
    position:absolute;

    top:20px;
    right:20px;

    width:200px;

    border-radius:20px;

    overflow:hidden;

    z-index:3;

    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

.video-box video{
    width:100%;
    display:block;
}

/* MOBILE VERSION */
@media(max-width:768px){

    .center-photo{
        width:320px;
        height:320px;
    }

    .video-box{
        width:140px;
        top:10px;
        right:10px;
    }
}

</style>
</head>

<body>

<!-- CENTER PHOTO -->
<div class="center-photo">
    <img src="./images/barbie.jpeg" alt="Photo">
</div>

<!-- VIDEO -->
<div class="video-box">
    <video controls autoplay>
        <source src="./images/WhatsApp Video 2026-05-26 at 2.54.05 AM.mp4" type="video/mp4">
    </video>
</div>

</body>
</html>
