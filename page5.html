<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose One</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      height:100vh;

      background:white;
      background-image: url('./images/main2.jpg');
         height:100vh;

    /* PUT YOUR IMAGE NAME HERE */
    

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family: Arial, sans-serif;
      overflow:hidden;

      display:flex;
      justify-content:center;
      align-items:center;

      font-family:'Baloo 2', cursive;
    }

    /* MAIN CONTAINER */
    .container{
      width:100%;
      height:100vh;

      position:relative;

      display:flex;
      flex-direction:column;
      align-items:center;
    }

    /* TOP TEXT */
    .main-text{
      margin-top:25px;

      font-size:60px;
      font-weight:700;

      color:#d96a5f;

      letter-spacing:3px;

      text-align:center;
    }

    .sub-text{
      font-size:35px;
      font-weight:600;

      color:#b98989;

      margin-top:-10px;
    }

    /* CORNER IMAGES */
    .corner-left{
      position:absolute;

      top:90px;
      left:40px;
    }

    .corner-left img{
      width:120px;
      height:auto;
    }

    .corner-right{
      position:absolute;

      top:90px;
      right:40px;
    }

    .corner-right img{
      width:120px;
      height:auto;
    }

    /* CLICKABLE ITEMS */
    .items{
      width:100%;

      display:flex;
      justify-content:center;
      align-items:center;

      gap:90px;

      margin-top:80px;
    }

    .item{
      cursor:pointer;

      transition:0.2s;
    }

    .item:hover{
      transform:scale(1.08);
    }

    .item img{
      width:250px;
      height:auto;
    }

    /* DIFFERENT SIZES */
    .bottle img{
      width:180px;
    }

    .star img{
      width:220px;
    }

    /* MOBILE */
    @media(max-width:768px){

      .main-text{
        font-size:34px;
        margin-top:35px;
      }

      .sub-text{
        font-size:22px;
      }

      .corner-left img,
      .corner-right img{
        width:70px;
      }

      .corner-left{
        left:10px;
        top:110px;
      }

      .corner-right{
        right:10px;
        top:110px;
      }

      .items{
        gap:20px;
        margin-top:100px;
      }

      .item img{
        width:110px;
      }

      .bottle img{
        width:90px;
      }

      .star img{
        width:100px;
      }
    }

  </style>
</head>
<body>

  <div class="container">

    <!-- TOP TEXT -->
    <div class="main-text">
      These are for you!
    </div>

    <div class="sub-text">
      Choose one to open
    </div>

    <!-- TOP LEFT IMAGE -->
    <div class="corner-left">

      <!-- PUT YOUR IMAGE HERE -->
      <img src="./images/image dog 2.png" alt="Dog">

    </div>

    <!-- TOP RIGHT IMAGE -->
    <div class="corner-right">

      <!-- PUT YOUR IMAGE HERE -->
      <img src="./images/image dog.png" alt="Dog">

    </div>

    <!-- CLICKABLE IMAGES -->
    <div class="items">

      <!-- CAMERA -->
      <a href="camera.html" class="item">

        <!-- PUT YOUR IMAGE HERE -->
        <img src="./images/image10.png" alt="Camera">

      </a>

      <!-- BOTTLE -->
      <a href="bottle.html" class="item bottle">

        <!-- PUT YOUR IMAGE HERE -->
        <img src="images/image9.png" alt="Bottle">

      </a>

      <!-- STAR -->
      <a href="./her.html" class="item star">

        <!-- PUT YOUR IMAGE HERE -->
        <img src="./images/image8.png" alt="Star">

      </a>

    </div>

  </div>

</body>
</html>
