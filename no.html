<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Go Back Page</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      height:100vh;

      background:white;

      display:flex;
      justify-content:center;
      align-items:center;

      font-family:'Baloo 2', cursive;

      overflow:hidden;
    }

    .container{
      text-align:center;
    }

    /* GIF */
    .gif img{
      width:180px;
      height:auto;

      margin-bottom:20px;
    }

    /* TEXT */
    .main-text{
      font-size:70px;
      font-weight:800;

      color:#c45a84;

      letter-spacing:3px;

      text-shadow:
      2px 2px 0px white,
      0 0 3px rgba(0,0,0,0.1);

      margin-bottom:35px;
    }
    body{
    width:100%;
    height:100vh;

    /* BACKGROUND IMAGE */
    background-image: url('background.jpg');

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:'Baloo 2', cursive;

    overflow:hidden;
}

    /* BUTTON */
    .back-btn{
      width:260px;
      height:90px;

      border:none;

      border-radius:45px;

      background:#c45a84;

      color:white;

      font-size:45px;
      font-weight:700;

      font-family:'Baloo 2', cursive;

      cursor:pointer;

      position:relative;

      box-shadow:
      inset 0 -5px 0 rgba(0,0,0,0.15),
      0 5px 10px rgba(0,0,0,0.15);

      transition:0.2s;
    }

    .back-btn:hover{
      transform:scale(1.05);
    }

    /* UNDERLINE */
    .back-btn span{
      position:relative;
      display:inline-block;
    }

    .back-btn span::after{
      content:'';

      position:absolute;

      left:0;
      bottom:-4px;

      width:100%;
      height:5px;

      background:white;

      border-radius:10px;
    }

    /* RESPONSIVE */
    @media(max-width:768px){

      .gif img{
        width:300px;
        height: 300px;
      }

      .main-text{
        font-size:42px;
      }

      .back-btn{
        width:200px;
        height:70px;
        font-size:32px;
      }
    }

  </style>
</head>
<body>

  <div class="container">

    <!-- GIF -->
    <div class="gif">

      <!-- PUT YOUR GIF HERE -->
      <img src="./images/Snoopy.jpg" alt="Cute Dog">

    </div>

    <!-- TEXT -->
    <div class="main-text">
      HOW DARE YOU
    </div>

    <!-- BUTTON -->
    <button class="back-btn"
    onclick="window.location.href='index2.html'">

      <span>Go back</span>

    </button>

  </div>

</body>
</html>
