<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make A Wish</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      height:100vh;

      background:white;
        background-image: url('./images/main.jpg');
      overflow:hidden;

      display:flex;
      justify-content:center;
      align-items:center;

      font-family:'Baloo 2', cursive;
    }

    /* MAIN CONTAINER */
    .container{
      width:100%;
      height:100vh;

      position:relative;

      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
    }

    /* TEXT */
    .wish-text{
      margin-top:20px;

      font-size:65px;
      font-weight:700;

      color:#d96a5f;

      letter-spacing:3px;
    }

    /* BIG CAKE IMAGE */
    .cake-box{
      width:100%;

      display:flex;
      justify-content:center;
      align-items:center;

      margin-top:10px;
    }

    .cake-box img{
      width:900px;   /* BIG SIZE */
      max-width:95%;

      height:auto;
    }

    /* BLOW BUTTON */
    .blow-btn{
      position:absolute;

      bottom:90px;

      width:240px;
      height:95px;

      border:none;

      border-radius:40px;

      background:#ffd7e6;

      color:#ff5f5f;

      font-size:48px;
      font-weight:800;

      font-family:'Baloo 2', cursive;

      cursor:pointer;

      box-shadow:
      inset 0 -5px 0 rgba(0,0,0,0.08),
      0 5px 10px rgba(0,0,0,0.12);

      transition:0.2s;
    }

    .blow-btn:hover{
      transform:scale(1.05);
    }

    /* MOBILE */
    @media(max-width:768px){

      .wish-text{
        font-size:42px;
        margin-top:25px;
      }

      .cake-box img{
        width:430px;
      }

      .blow-btn{
        width:180px;
        height:75px;

        font-size:34px;

        bottom:70px;
      }
    }

  </style>
</head>
<body>

  <div class="container">

    <!-- TEXT -->
    <div class="wish-text">
      Make a wish
    </div>

    <!-- BIG CAKE IMAGE -->
    <div class="cake-box">

      <!-- PUT YOUR CAKE IMAGE/GIF HERE -->
      <img src="./images/cake burnt.png" alt="Birthday Cake">

    </div>

    <!-- BLOW BUTTON -->
    <button class="blow-btn"
    onclick="window.location.href='page4.html'">

      BLOW

    </button>

  </div>

</body>
</html>
