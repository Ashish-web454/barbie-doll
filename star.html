<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Photo & Video Page</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    font-family:Arial, sans-serif;

    /* BACKGROUND IMAGE */
    background-image:url("./images/main31.jpeg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

/* DARK OVERLAY */
.overlay{

    position:absolute;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.35);
}

/* CENTER PHOTO */
.center-photo{

    position:relative;

    width:300px;
    height:300px;

    border-radius:25px;

    overflow:hidden;

    z-index:2;

    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.center-photo img{

    width:100%;
    height:100%;

    object-fit:cover;
}

/* SMALL VIDEO TOP RIGHT */
.video-box{

    position:absolute;

    top:30px;
    right:30px;

    width:320px;

    border-radius:20px;

    overflow:hidden;

    z-index:3;

    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.video-box video{

    width:100%;
    display:block;
}

</style>
</head>

<body>

<!-- DARK EFFECT -->
<div class="overlay"></div>

<!-- YOUR PHOTO IN CENTER -->
<div class="center-photo">

    <img src="./images/barbie.jpeg" alt="Photo">

</div>

<!-- SMALL VIDEO -->
<div class="video-box">

    <video controls autoplay>

        <source src="./images/WhatsApp Video 2026-05-26 at 2.54.05 AM.mp4" type="video/mp4">

    </video>

</div>

</body>
</html>
